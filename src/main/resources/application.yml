# Spring Boot 프로젝트 전체 설정
spring:
  datasource:
    # AWS EC2 인스턴스의 퍼블릭 IP 주소와 생성한 데이터베이스명을 입력합니다.
    url: jdbc:mariadb://15.135.113.196:3306/a5_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    # 데이터베이스 접속 계정 정보
    username: a5_admin
    password: 4622
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # 엔티티 구조와 DB 테이블을 자동으로 동기화 (개발 환경용)
      ddl-auto: update
    properties:
      hibernate:
        # 실행되는 SQL 쿼리를 콘솔에 포맷팅하여 출력
        show_sql: true
        format_sql: true

server:
  # 애플리케이션 구동 포트 번호
  port: 8080